---
- name: Set default shell to zsh
  ansible.builtin.user:
    name: "{{ ansible_user_id }}"
    shell: /bin/zsh
  tags: [zsh]

- name: Download ohmyzsh installation script
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh
    dest: "/tmp/install-ohmyzsh.sh"
    mode: '0755'
  tags: [zsh]

- name: Run ohmyzsh installation
  ansible.builtin.script: "/tmp/install-ohmyzsh.sh"
  ignore_errors: yes
  tags: [zsh]

- name: Ensure custom plugins directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.oh-my-zsh/custom/plugins"
    state: directory
    mode: '0755'
  tags: [zsh, ohmyzsh-plugins]

- name: Install zsh-autosuggestions
  ansible.builtin.git:
    repo: https://github.com/zsh-users/zsh-autosuggestions
    dest: "{{ ansible_env.HOME }}/.oh-my-zsh/custom/plugins/zsh-autosuggestions"
    depth: 1
    version: master
  tags: [zsh, ohmyzsh-plugins]

- name: Install zsh-syntax-highlighting
  ansible.builtin.git:
    repo: https://github.com/zsh-users/zsh-syntax-highlighting
    dest: "{{ ansible_env.HOME }}/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting"
    depth: 1
    version: master
  tags: [zsh, ohmyzsh-plugins]

- name: Install zsh-completions
  ansible.builtin.git:
    repo: https://github.com/zsh-users/zsh-completions
    dest: "{{ ansible_env.HOME }}/.oh-my-zsh/custom/plugins/zsh-completions"
    depth: 1
    version: master
  tags: [zsh, ohmyzsh-plugins]
