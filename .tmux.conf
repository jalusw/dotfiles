bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -n M-h resize-pane -L 5
bind -n M-j resize-pane -D 5
bind -n M-k resize-pane -U 5
bind -n M-l resize-pane -R 5

set -g mouse on
set -g base-index 1

# Rosé Pine status bar
set -g status-style fg=#e0def4,bg=#191724
set -g status-left "#[fg=#191724,bg=#c4a7e7] #S #[fg=#c4a7e7,bg=#191724,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#908caa,bg=#191724] %Y-%m-%d %H:%M "
set -g status-left-length 40
set -g status-right-length 60
set -g status-justify centre

# Window status
setw -g window-status-format "#[fg=#6e6a86,bg=#191724] #I:#W "
setw -g window-status-current-format "#[fg=#191724,bg=#9ccfd8] #I:#W "
setw -g window-status-current-style fg=#191724,bg=#9ccfd8
setw -g window-status-style fg=#6e6a86,bg=#191724
setw -g window-status-separator ""

# Pane border
set -g pane-border-style fg=#403d52
set -g pane-active-border-style fg=#c4a7e7

# Mode
setw -g mode-keys vi
setw -g mode-style fg=#e0def4,bg=#403d52

# Message
set -g message-style fg=#e0def4,bg=#26233a

# Bell
setw -g window-status-bell-style fg=#191724,bg=#eb6f92
