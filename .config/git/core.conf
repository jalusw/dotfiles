[core]
  editor = nvim
  whitespace = fix,-indent-with-non-tab,trailing-space,cr-at-eol
  autocrlf = input
  safecrlf = true
  fileMode = true
  ignorecase = false
  quotepath = false
  pager = delta
  excludesfile = ~/.config/git/ignore
  attributesfile = ~/.config/git/attributes

[init]
  defaultBranch = main
