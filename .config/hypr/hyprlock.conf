# Hyprlock — Rosé Pine theme

general {
  disable_loading_bar = true
  hide_cursor = true
  no_fade_in = false
  no_fade_out = false
  grace = 0
  ignore_empty_input = true
}

background {
  path = screenshot
  blur_passes = 3
  blur_size = 8
  color = rgba(25, 23, 36, 1.0)
}

input-field {
  monitor =
  size = 300, 50
  outline_thickness = 2
  dots_size = 0.2
  dots_spacing = 0.5
  dots_center = true
  outer_color = rgba(64, 61, 82, 1.0)
  inner_color = rgba(31, 29, 46, 1.0)
  font_color = rgba(224, 222, 244, 1.0)
  fade_on_empty = true
  fade_timeout = 2000
  placeholder_text = <i>Password...</i>
  hide_input = false
  rounding = 8
  check_color = rgba(156, 207, 216, 1.0)
  fail_color = rgba(235, 111, 146, 1.0)
  fail_text = <i>$FAIL</i>
  fail_timeout = 2000
  fail_transition = 300
  caps_lock_text = Caps Lock
  position = 0, -80
  halign = center
  valign = center
}

label {
  monitor =
  text = $TIME
  color = rgba(224, 222, 244, 1.0)
  font_size = 48
  font_family = "FiraCode Nerd Font Mono"
  position = 0, 40
  halign = center
  valign = center
}

label {
  monitor =
  text = cmd[update:86400000] echo "$(date +%A, %d %B)"
  color = rgba(144, 140, 170, 1.0)
  font_size = 16
  font_family = "FiraCode Nerd Font Mono"
  position = 0, -10
  halign = center
  valign = center
}
