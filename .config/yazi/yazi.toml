[manager]
  show_hidden = true
  show_symlink = true
  sort_by = "natural"
  sort_dir_first = true
  linemode = "size"

[preview]
  max_width = 800
  max_height = 800
  image_quality = 75
  image_filter = "triangle"

[opener]
  edit = [
    { run = 'nvim "$@"', block = true },
  ]
  reveal = [
    { run = 'dolphin --select "$@"', block = true },
  ]
  open = [
    { run = 'xdg-open "$@"', block = false },
  ]

[open]
  rules = [
    { name = "*.md",  use = "edit" },
    { name = "*.txt", use = "edit" },
    { name = "*.toml", use = "edit" },
    { name = "*.json", use = "edit" },
    { name = "*.yaml", use = "edit" },
    { name = "*.yml",  use = "edit" },
    { name = "*.lua",  use = "edit" },
    { name = "*.py",   use = "edit" },
    { name = "*.rs",   use = "edit" },
    { name = "*.go",   use = "edit" },
    { name = "*.js",   use = "edit" },
    { name = "*.ts",   use = "edit" },
    { name = "*.css",  use = "edit" },
    { name = "*.html", use = "edit" },
    { name = "*.sh",   use = "edit" },
    { name = "*.zsh",  use = "edit" },
    { name = "*.bash", use = "edit" },
    { name = "*.pdf",  use = "open" },
    { name = "*.png",  use = "open" },
    { name = "*.jpg",  use = "open" },
    { name = "*.jpeg", use = "open" },
    { name = "*.gif",  use = "open" },
    { name = "*.svg",  use = "open" },
    { name = "*.webp", use = "open" },
    { name = "*.mp4",  use = "open" },
    { name = "*.mkv",  use = "open" },
    { name = "*.mov",  use = "open" },
    { name = "*.webm", use = "open" },
  ]
