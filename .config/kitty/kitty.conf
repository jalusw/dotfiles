# reference: https://sw.kovidgoyal.net/kitty/conf/

# Font
font_size 12
font_ltr yes
font_family Fira Code Nerd Font

# Window
window_padding_width 8

# Rosé Pine theme
background #191724
foreground #e0def4
cursor #c4a7e7
selection_background #403d52
selection_foreground #e0def4

color0 #21202e
color1 #eb6f92
color2 #31748f
color3 #f6c177
color4 #9ccfd8
color5 #c4a7e7
color6 #ebbcba
color7 #e0def4
color8 #403d52
color9 #eb6f92
color10 #31748f
color11 #f6c177
color12 #9ccfd8
color13 #c4a7e7
color14 #ebbcba
color15 #e0def4

# Keymaps
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+k scroll_up
map ctrl+j scroll_down
